<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>文章爬取器</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h3>爬取当前页面文章</h3>
  <div class="toolbar">
    <button id="scrapeBtn">爬取文章</button>
    <button id="downloadBtn" disabled>保存 TXT</button>
    <label class="save-option">
      <input id="chooseSavePath" type="checkbox" checked>
      选择保存位置
    </label>
  </div>
  <pre id="result"></pre>

  <script src="popup.js"></script>
</body>

</html>
