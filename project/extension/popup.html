<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>小说爬取器</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="app-shell">
    <section id="startView" class="view start-view">
      <div id="modeText" class="mode-text">正在识别当前页面...</div>
      <button id="scrapeBtn" class="primary-action">开始爬取</button>
      <label class="chapter-limit">
        <span id="chapterLimitLabel">爬取章节数</span>
        <input id="chapterLimit" type="number" min="1" step="1" placeholder="留空为全部">
      </label>
    </section>

    <section id="progressView" class="view progress-view" hidden>
      <div id="progressPanel" class="progress-panel">
        <div class="progress-row">
          <span id="progressText">准备中...</span>
          <span id="progressPercent">0%</span>
        </div>
        <progress id="progressBar" value="0" max="100"></progress>
        <div id="progressDetail" class="progress-detail"></div>
      </div>
    </section>

    <section id="resultView" class="view result-view" hidden>
      <div class="result-actions">
        <button id="downloadBtn" disabled>保存</button>
        <label class="save-option">
          <input id="chooseSavePath" type="checkbox" checked>
          选择保存地址
        </label>
      </div>
      <pre id="result"></pre>
    </section>
  </main>

  <script src="popup.js"></script>
</body>

</html>
